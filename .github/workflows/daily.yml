name: Daily GitHub Activity Log

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  activity-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Real GitHub Activity
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: zannbjir
        run: |
          DATE=$(date '+%Y-%m-%d')
          FILENAME="zannbjir-${DATE}.txt"
          
          echo "=== GitHub Activity - $DATE ===" > $FILENAME
          echo "Generated at: $(date '+%Y-%m-%d %H:%M WIB')" >> $FILENAME
          echo "" >> $FILENAME

          echo "1. Commit Hari Ini:" >> $FILENAME
          git log --since="24 hours ago" --pretty=format:"- %h %s" >> $FILENAME 2>/dev/null || echo "- Tidak ada commit baru" >> $FILENAME
          echo "" >> $FILENAME

          echo "2. Total Commits Repo Ini: $(git rev-list --count HEAD)" >> $FILENAME
          echo "" >> $FILENAME

          echo "3. Recent GitHub Activity:" >> $FILENAME
          curl -s -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/users/$USERNAME/events?per_page=20" | \
          jq -r '
            .[] | 
            if .type == "PushEvent" then
              "- Push → \(.repo.name) | \(.payload.commits[0].message[:100])"
            elif .type == "WatchEvent" then
              "- Starred → \(.repo.name)"
            elif .type == "FollowEvent" then
              "- Followed → \(.payload.target.login)"
            elif .type == "CreateEvent" then
              "- Created \(.payload.ref_type) → \(.repo.name)"
            elif .type == "ForkEvent" then
              "- Forked → \(.repo.name)"
            else
              "- \(.type) → \(.repo.name)"
            end
          ' 2>/dev/null | head -n 15 >> $FILENAME || echo "- Tidak bisa ambil data API" >> $FILENAME

          echo "" >> $FILENAME
          echo "=== End of Log ===" >> $FILENAME

      - name: Commit & Push
        run: |
          git config user.name "zannbjir"
          git config user.email "zannbjir@users.noreply.github.com"
          git add zannbjir-*.txt
          git commit -m "📋 Daily activity log - $(date '+%Y-%m-%d')" || echo "No changes"
          git push
