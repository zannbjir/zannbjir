name: Daily GitHub Activity Log

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  activity-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Real GitHub Activity
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: zannbjir
        run: |
          YEAR=$(date '+%Y')
          DATE=$(date '+%Y-%m-%d')
          DAY_FOLDER="${YEAR}/${DATE}"
          LOG_FILE="${DAY_FOLDER}/zannbjir-${DATE}.txt"
          
          mkdir -p "${DAY_FOLDER}"
          
          echo "=== GitHub Activity - ${DATE} ===" > "${LOG_FILE}"
          echo "Generated at: $(date '+%Y-%m-%d %H:%M WIB')" >> "${LOG_FILE}"
          echo "" >> "${LOG_FILE}"

          echo "1. Commit Hari Ini:" >> "${LOG_FILE}"
          git log --since="24 hours ago" --pretty=format:"- %h %s" >> "${LOG_FILE}" 2>/dev/null || echo "- Tidak ada commit baru" >> "${LOG_FILE}"
          echo "" >> "${LOG_FILE}"

          echo "2. Total Commits Repo Ini: $(git rev-list --count HEAD)" >> "${LOG_FILE}"
          echo "" >> "${LOG_FILE}"

          echo "3. Recent GitHub Activity:" >> "${LOG_FILE}"
          curl -s -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/users/$USERNAME/events?per_page=20" | \
          jq -r '
            .[] | 
            if .type == "PushEvent" then
              "- Push → \(.repo.name) | \(.payload.commits[0].message[:100])"
            elif .type == "WatchEvent" then
              "- Starred → \(.repo.name)"
            elif .type == "FollowEvent" then
              "- Followed → \(.payload.target.login)"
            elif .type == "CreateEvent" then
              "- Created \(.payload.ref_type) → \(.repo.name)"
            elif .type == "ForkEvent" then
              "- Forked → \(.repo.name)"
            else
              "- \(.type) → \(.repo.name)"
            end
          ' 2>/dev/null | head -n 15 >> "${LOG_FILE}" || echo "- Tidak bisa ambil data API" >> "${LOG_FILE}"

          echo "" >> "${LOG_FILE}"
          echo "=== End of Log ===" >> "${LOG_FILE}"
          echo "✅ Log file created at: ${LOG_FILE}"

      - name: 30 Commits + Auto Cleanup
        run: |
          git config user.name "zannbjir"
          git config user.email "zannbjir@users.noreply.github.com"
          
          YEAR=$(date '+%Y')
          DATE=$(date '+%Y-%m-%d')
          DAY_FOLDER="${YEAR}/${DATE}"
          
          mkdir -p "${DAY_FOLDER}"
          
          # 1. Bikin 30 file dummy dan commit satu-satu
          for i in {1..30}; do
            DUMMY_FILE="${DAY_FOLDER}/dummy-${i}.txt"
            echo "Daily activity log - ${DATE} - commit #${i}" > "${DUMMY_FILE}"
            git add "${DUMMY_FILE}"
            git commit -m "📌 Daily activity #${i} - ${DATE}" || true
          done
          
          # 2. Hapus semua file dummy biar repo tetap bersih
          rm "${DAY_FOLDER}"/dummy-*.txt
          git add -u
          git commit -m "🧹 Clean up 30 dummy files - ${DATE}" || true
          
          # 3. Commit file log utama
          git add "${DAY_FOLDER}/zannbjir-${DATE}.txt"
          git commit -m "📋 Daily activity log - ${DATE}" || echo "No changes"
          
          git push
